<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أذكار المسلم</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
    direction:rtl;
}

header{
    padding:60px 20px;
}

h1{
    font-size:42px;
    margin-bottom:15px;
}

p{
    font-size:18px;
    opacity:0.85;
}

.download-btn{
    display:inline-block;
    margin-top:30px;
    padding:15px 35px;
    font-size:18px;
    background:#00ffcc;
    color:black;
    text-decoration:none;
    border-radius:12px;
    transition:0.3s;
}

.download-btn:hover{
    background:#00ccaa;
    transform:scale(1.05);
}

.section{
    padding:60px 20px;
}

.features{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:40px;
}

.card{
    background:rgba(255,255,255,0.1);
    padding:25px;
    width:250px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.screenshots{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:40px;
}

.screenshots img{
    width:250px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:0.3s;
}

.screenshots img:hover{
    transform:scale(1.05);
}

footer{
    padding:30px;
    margin-top:40px;
    font-size:15px;
}

.social a{
    font-size:28px;
    color:#00ffcc;
    margin-top:15px;
    display:inline-block;
    transition:0.3s;
}

.social a:hover{
    transform:scale(1.2);
    color:#1877f2;
}
</style>
</head>

<body>

<header>
    <h1>📿 أذكار المسلم</h1>
    <p>تطبيق أذكار الصباح والمساء بطريقة سهلة وجميلة.</p>
    <a class="download-btn" href="com.azkar_1.0.apk">تحميل التطبيق</a>
</header>

<section class="section">
    <h2>✨ مميزات التطبيق</h2>
    <div class="features">
        <div class="card">
            <h3>أذكار الصباح والمساء</h3>
            <p>كل الأذكار في مكان واحد.</p>
        </div>
        <div class="card">
            <h3>الوضع الليلي</h3>
            <p>قراءة مريحة للعين.</p>
        </div>
        <div class="card">
            <h3>تصميم بسيط</h3>
            <p>سهل الاستخدام لكل الأعمار.</p>
        </div>
    </div>
</section>

<section class="section">
    <h2>📱 صور من التطبيق</h2>
    <div class="screenshots">
        <img src="screen1.jpg" alt="screenshot 1">
        <img src="screen2.jpg" alt="screenshot 2">
    </div>
</section>

<footer>
    Created by Zeyad Ahmed
    <div class="social">
        <a href="https://www.facebook.com/share/1P63VeiYuy/" target="_blank">
            <i class="fab fa-facebook"></i>
        </a>
    </div>
</footer>

</body>
</html>
